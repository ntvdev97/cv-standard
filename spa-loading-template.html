<!-- spa-loading-template.html -->
<style>
  :root {
    --bg-loader: #ffffff;
    --text-loader: #1f2937;
    --accent-loader: #00b574;
    --circle-loader: #e5e7eb;
  }

  [data-theme="dark"] {
    --bg-loader: #0b0f19;
    --text-loader: #f3f4f6;
    --accent-loader: #00dc82;
    --circle-loader: #1f2937;
  }

  .spa-loader-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--bg-loader);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      sans-serif;
    z-index: 99999;
    transition: background-color 0.3s ease;
  }

  .spa-loader-container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spa-loader-logo {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-loader);
    margin-bottom: 1.5rem;
    letter-spacing: -0.05em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .spa-loader-logo span {
    color: var(--accent-loader);
  }

  .spinner-ring {
    position: relative;
    width: 64px;
    height: 64px;
  }

  .spinner-ring div {
    box-sizing: border-box;
    display: block;
    position: absolute;
    width: 52px;
    height: 52px;
    margin: 6px;
    border: 3px solid var(--accent-loader);
    border-radius: 50%;
    animation: spinner-ring-anim 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    border-color: var(--accent-loader) transparent transparent transparent;
  }

  .spinner-ring div:nth-child(1) {
    animation-delay: -0.45s;
  }

  .spinner-ring div:nth-child(2) {
    animation-delay: -0.3s;
  }

  .spinner-ring div:nth-child(3) {
    animation-delay: -0.15s;
  }

  @keyframes spinner-ring-anim {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  .spa-loader-text {
    margin-top: 1.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-loader);
    opacity: 0.8;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    animation: pulse-text-anim 1.5s ease-in-out infinite;
  }

  @keyframes pulse-text-anim {
    0%,
    100% {
      opacity: 0.5;
    }
    50% {
      opacity: 0.9;
    }
  }
</style>

<div class="spa-loader-wrapper" id="spa-loader">
  <script>
    (function () {
      try {
        const theme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);

        // Also apply it to the loader element itself so the background changes immediately
        const loader = document.getElementById("spa-loader");
        if (loader) {
          loader.setAttribute("data-theme", theme);
        }
      } catch (e) {
        console.error("Error applying theme inside loader:", e);
      }
    })();
  </script>
  <div class="spa-loader-container">
    <div class="spa-loader-logo"><span>&lt;</span>TV<span>/&gt;</span></div>
    <div class="spinner-ring">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
    <div class="spa-loader-text">Loading Workspace</div>
  </div>
</div>
